<title>Beauty Maintenance</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700&family=Inter:wght@400;500;600&display=swap');
:root{--bg:#1f1c1a;--card:#2a2623;--edge:rgba(255,255,255,.08);--faint:#332e2a;--ink:#f0e9e2;--sub:#a99f95;--accent:#d98a9b;--ok:#6cbf9a;--due:#e0aa5c;--overdue:#e07b6d;--grey:#7c726a;--btnbg:#efe7df;--btntext:#211d1b;--disp:'Bricolage Grotesque',system-ui,sans-serif}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif}
body{background-image:radial-gradient(120% 50% at 50% -6%,rgba(217,138,155,.13),transparent 60%),radial-gradient(90% 40% at 100% 0%,rgba(108,191,154,.07),transparent 55%);min-height:100vh}
.wrap{max-width:560px;margin:0 auto;padding:44px 18px 120px}
.head{text-align:center;margin-bottom:28px}
.spark{display:inline-flex;align-items:center;gap:8px;margin-bottom:10px}
.spark .ln{width:24px;height:1.5px;background:var(--accent);opacity:.6;border-radius:2px}
h1{font-family:var(--disp);font-size:35px;font-weight:700;letter-spacing:-.03em;margin:0;line-height:1.03}
.sub{color:var(--sub);margin:9px 0 0;font-size:13.5px}
.tl{background:var(--card);border:1px solid var(--edge);border-radius:18px;padding:14px 14px 12px;margin-bottom:22px;box-shadow:0 4px 16px rgba(0,0,0,.28)}
.tl-h{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--sub);font-weight:600;margin-bottom:12px}
.tl-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:4px}
.tl-col{display:flex;flex-direction:column;align-items:center;gap:5px;padding:7px 0 6px;border-radius:10px}
.tl-col.now{background:var(--faint)}
.tl-dots{display:flex;flex-direction:column-reverse;align-items:center;gap:3px;min-height:33px}
.tl-dot{width:6.5px;height:6.5px;border-radius:999px}
.tl-more{font-size:8.5px;color:var(--sub);line-height:1}
.tl-m{font-size:10px;color:var(--sub)}
.tl-m.now{color:var(--ink);font-weight:600}
.hero{position:relative;overflow:hidden;border-radius:22px;padding:22px;margin-bottom:26px;box-shadow:0 8px 26px rgba(0,0,0,.35)}
.eyebrow{font-size:10.5px;letter-spacing:.26em;text-transform:uppercase;margin-bottom:14px;font-weight:600}
.row{display:flex;gap:18px;align-items:center}
.hero h2{margin:0;font-family:var(--disp);font-size:27px;font-weight:700;letter-spacing:-.02em;line-height:1.05}
.hero .phr{font-size:13px;margin-top:5px;font-weight:600}
.hero .cad{font-size:12.5px;color:var(--sub);margin-top:2px}
.hero-btns{display:flex;gap:10px;margin-top:18px}
.ringWrap{position:relative;flex-shrink:0}
.ringLabel{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1}
.sec{display:flex;align-items:center;gap:10px;margin:20px 2px 12px}
.sec span:first-child{font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--sub);font-weight:600}
.sec .line{flex:1;height:1px;background:var(--edge)}
.sec .cnt{font-size:11px;color:var(--grey)}
.card{position:relative;background:var(--card);border-radius:16px;margin-bottom:11px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.28);border:1px solid var(--edge)}
.card.paused{opacity:.6}
.cEdge{position:absolute;left:0;top:0;bottom:0;width:3.5px}
.cHead{display:flex;gap:13px;align-items:center;padding:14px 15px 14px 19px;cursor:pointer}
.cMain{flex:1;min-width:0}
.cName{margin:0;font-family:var(--disp);font-size:19px;font-weight:600;letter-spacing:-.01em;line-height:1.15}
.cad{font-size:12px;color:var(--sub);margin-top:3px}
.cRight{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.phr{font-size:11.5px;font-weight:600;white-space:nowrap}
.rBtns{display:flex;align-items:center;gap:6px}
.chev{color:var(--sub);transition:transform .2s;display:inline-flex}
.chev.open{transform:rotate(180deg)}
.cBody{padding:2px 15px 15px 19px}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.hist{background:var(--faint);border-radius:12px;padding:11px 13px}
.hist-h{display:flex;justify-content:space-between;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--sub)}
.hist-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:13px}
.ed-row{display:flex;justify-content:flex-end;gap:4px;margin-top:8px}
.btn{display:inline-flex;align-items:center;gap:6px;border:none;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;border-radius:13px;padding:12px;transition:transform .12s}
.btn:active{transform:scale(.97)}
.btnPrimary{background:var(--btnbg);color:var(--btntext);flex:1;justify-content:center}
.btnGhost{background:var(--faint);color:var(--ink);border:1px solid var(--edge);font-weight:500;padding:12px 16px}
.btnSm{border-radius:9px;padding:6px 11px;font-size:12.5px;gap:5px}
.btnDone{background:rgba(108,191,154,.16);color:var(--ok)}
.btnDone.confirm,.btnPrimary.confirm{background:var(--ok);color:#17140f}
.confirmHint{font-size:10px;color:var(--ok);white-space:nowrap;margin-top:2px}
.btnResume{background:var(--faint);color:var(--ink);border:1px solid var(--edge)}
.chip{display:inline-flex;align-items:center;gap:5px;background:var(--faint);border:1px solid var(--edge);border-radius:9px;padding:6px 10px;font-size:12.5px;cursor:pointer;color:var(--sub);font-family:inherit;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.toggle{display:inline-flex;align-items:center;gap:6px;border:none;cursor:pointer;border-radius:999px;padding:6px 11px;font-size:12px;font-family:inherit;background:var(--faint);color:var(--sub)}
.toggle.on{background:rgba(217,138,155,.16);color:var(--accent)}
.pausechip{display:inline-flex;align-items:center;gap:5px;background:var(--faint);border:1px solid var(--edge);border-radius:999px;padding:6px 11px;font-size:12px;cursor:pointer;color:var(--sub);font-family:inherit}
.iconbtn{background:none;border:none;color:var(--sub);cursor:pointer;padding:6px;display:inline-flex}
.add{width:100%;margin-top:14px;display:flex;align-items:center;justify-content:center;gap:8px;background:transparent;color:var(--accent);border:1.5px dashed rgba(217,138,155,.4);border-radius:14px;padding:15px;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit}
.footer{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:26px;font-size:12px;color:var(--sub);flex-wrap:wrap}
.footer b{color:var(--ink);font-weight:600}
select{background:var(--card);border:1px solid var(--edge);color:var(--sub);border-radius:8px;padding:3px 6px;font-size:12px;font-family:inherit}
.overlay{position:fixed;inset:0;background:rgba(8,6,5,.62);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;z-index:50}
.sheet{width:100%;max-width:480px;background:var(--card);border-radius:24px 24px 0 0;padding:22px 20px 30px;max-height:90vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.5);border:1px solid var(--edge)}
.sheet h2{margin:0;font-family:var(--disp);font-size:23px;font-weight:700;letter-spacing:-.01em}
.sheet-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.lbl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--sub);margin-bottom:7px;display:block}
.fld{width:100%;background:var(--faint);border:1px solid var(--edge);color:var(--ink);border-radius:11px;padding:12px 13px;font-size:15px;outline:none;margin-bottom:16px;font-family:inherit}
.closeb{background:var(--faint);border:none;border-radius:999px;width:34px;height:34px;display:grid;place-items:center;color:var(--sub);cursor:pointer}
.chk{display:flex;align-items:center;gap:8px;color:var(--sub);font-size:13px;margin:-8px 0 18px;cursor:pointer}
.notifyRow{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
input[type=date]{color-scheme:dark}
html,body{overflow-x:hidden;max-width:100%}
.wrap{width:100%}
.pn{display:flex;align-items:center;gap:8px 12px;flex-wrap:wrap;margin:0 15px 0 19px;padding:11px 0 13px;border-top:1px solid var(--edge)}
.pn-item{display:inline-flex;align-items:baseline;gap:6px;font-size:13px;color:var(--ink)}
.pn-l{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--sub)}
.pn-arw{color:var(--sub);font-size:15px}
.pn-empty{font-size:12.5px;color:var(--accent)}
.hero-pn{margin-top:12px;display:flex;align-items:center;gap:8px 12px;flex-wrap:wrap}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div id="app"></div>
<div id="modal"></div>
<script>
"use strict";
/* ---------- constants ---------- */
var RECUR=[{v:1,l:"Monthly"},{v:2,l:"Every 2 months"},{v:3,l:"Every 3 months"},{v:6,l:"Every 6 months"},{v:12,l:"Yearly"}];
var CURR=["$","\u00a3","\u20ac","AED","SAR","\u20b9","\u00a5","\u20a9"];
var ICON={
 check:'<polyline points="20 6 9 17 4 12"/>',
 play:'<polygon points="6 3 20 12 6 21 6 3"/>',
 pause:'<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>',
 chev:'<polyline points="6 9 12 15 18 9"/>',
 bell:'<path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>',
 belloff:'<path d="M8.7 3A6 6 0 0 1 18 8c0 2.4.5 4.2 1.1 5.5"/><path d="M17 17H3s3-2 3-9a6 6 0 0 1 .3-1.9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/><line x1="2" y1="2" x2="22" y2="22"/>',
 coins:'<circle cx="8" cy="8" r="6"/><path d="M18.09 10.37A6 6 0 1 1 10.34 18"/><path d="M7 6h1v4"/>',
 pin:'<path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/>',
 pencil:'<path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/>',
 trash:'<path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>',
 x:'<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
 plus:'<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>'
};
function ic(n,sz,col){sz=sz||16;return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 24 24" fill="none" stroke="'+(col||'currentColor')+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+ICON[n]+'</svg>';}

/* ---------- seed ---------- */
var RAW=[
 {id:"teeth-whitening",name:"Teeth Whitening",lastDone:"2025-09-03",intervalMonths:12,notify:true},
 {id:"hydra-facial",name:"Hydra-facial",lastDone:"2025-12-14",intervalMonths:12,notify:true},
 {id:"scarlett",name:"Scarlett Session",lastDone:"2025-12-14",intervalMonths:12,notify:false},
 {id:"eye-exam",name:"Eye Exam",lastDone:null,intervalMonths:12,notify:true},
 {id:"teeth-cleaning",name:"Teeth Cleaning",lastDone:"2026-01-18",intervalMonths:6,notify:true},
 {id:"blood-vitamins",name:"Blood & Vitamins Checkup",lastDone:"2026-04-07",intervalMonths:3,notify:true},
 {id:"underarm-botox",name:"Underarm Botox",lastDone:"2026-05-06",intervalMonths:6,notify:false},
 {id:"face-botox",name:"Face Botox",lastDone:"2026-07-01",intervalMonths:6,notify:true},
 {id:"hair-trimming",name:"Hair Trimming",lastDone:"2026-07-12",intervalMonths:3,notify:false},
 {id:"scalp",name:"Scalp Treatment",lastDone:"2026-07-12",intervalMonths:3,notify:false},
 {id:"moroccan-bath",name:"Moroccan Bath",lastDone:"2026-05-19",intervalMonths:2,notify:true}
];
function migrate(a){return a.map(function(i){var ld=i.lastDone||(i.history&&i.history.length?i.history[i.history.length-1]:null);return{id:i.id,name:i.name,lastDone:ld,intervalMonths:i.intervalMonths,notify:!!i.notify,cost:i.cost||0,provider:i.provider||"",paused:!!i.paused};});}

/* ---------- helpers ---------- */
var DAY=86400000;
function strip(d){var x=new Date(d);x.setHours(0,0,0,0);return x.getTime();}
function pd(s){return new Date(s+"T00:00:00");}
function toInput(d){var x=new Date(d),m=String(x.getMonth()+1).padStart(2,"0"),day=String(x.getDate()).padStart(2,"0");return x.getFullYear()+"-"+m+"-"+day;}
function addMonths(s,months){var d=pd(s),day=d.getDate();d.setDate(1);d.setMonth(d.getMonth()+months);var dim=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();d.setDate(Math.min(day,dim));return d;}
function uniqSort(a){return Array.from(new Set(a)).sort();}
function last(a){return a.length?a[a.length-1]:null;}
function fmtShort(d){return d.toLocaleDateString("en-GB",{day:"numeric",month:"short"});}
function fmtLong(d){return d.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});}
function cadence(m){for(var i=0;i<RECUR.length;i++)if(RECUR[i].v===m)return RECUR[i].l;return "Every "+m+" months";}
function money(n){return cur+Number(n||0).toLocaleString(undefined,{maximumFractionDigits:0});}
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
function today(){return new Date();}
function statusOf(it){
 var anchor=it.lastDone;
 if(!anchor)return{key:"unset",progress:0};
 var due=addMonths(anchor,it.intervalMonths);
 var days=Math.floor((strip(due)-strip(today()))/DAY);
 var start=strip(pd(anchor)),total=strip(due)-start;
 var progress=total>0?(strip(today())-start)/total:1;
 var key=days<0?"overdue":days<=14?"due":"ok";
 return{key:key,days:days,due:due,progress:progress,anchor:anchor};
}
function colorFor(k){return{ok:"#6cbf9a",due:"#e0aa5c",overdue:"#e07b6d",unset:"#7c726a"}[k];}
function phrase(s){return s.key==="unset"?"no date":s.days<0?Math.abs(s.days)+"d overdue":s.days===0?"today":"in "+s.days+" days";}

function ring(progress,color,center,small,size){
 size=size||54;var stroke=size>=70?6:4.5,r=(size-stroke)/2,circ=2*Math.PI*r,p=Math.max(0,Math.min(1,progress)),off=circ*(1-p);
 var cf=size>=70?24:15,sf=size>=70?9:8;
 return '<div class="ringWrap" style="width:'+size+'px;height:'+size+'px">'
 +'<svg width="'+size+'" height="'+size+'">'
 +'<circle cx="'+(size/2)+'" cy="'+(size/2)+'" r="'+r+'" fill="none" stroke="rgba(255,255,255,.09)" stroke-width="'+stroke+'"/>'
 +'<circle cx="'+(size/2)+'" cy="'+(size/2)+'" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="'+stroke+'" stroke-dasharray="'+circ+'" stroke-dashoffset="'+off+'" stroke-linecap="round" transform="rotate(-90 '+(size/2)+' '+(size/2)+')"/>'
 +'</svg>'
 +'<div class="ringLabel"><span style="font-size:'+cf+'px;font-weight:600;color:var(--ink)">'+center+'</span>'
 +(small?'<span style="font-size:'+sf+'px;letter-spacing:.08em;text-transform:uppercase;color:var(--sub);margin-top:3px">'+small+'</span>':'')
 +'</div></div>';
}

/* ---------- state ---------- */
var items=[],cur="$",editing=null,expanded={};
function load(){
 try{var r=localStorage.getItem("beauty:items");items=r?migrate(JSON.parse(r)):migrate(RAW);}catch(e){items=migrate(RAW);}
 try{var c=localStorage.getItem("beauty:cur");if(c)cur=c;}catch(e){}
}
function save(){try{localStorage.setItem("beauty:items",JSON.stringify(items));}catch(e){}}
function find(id){for(var i=0;i<items.length;i++)if(items[i].id===id)return items[i];return null;}

/* ---------- actions ---------- */
var pendingDone=null,pendingTimer=null;
function clearPending(){pendingDone=null;if(pendingTimer){clearTimeout(pendingTimer);pendingTimer=null;}}
function requestDone(id){
 if(pendingDone===id){ // second tap = confirm
  clearPending();var it=find(id);if(it){it.lastDone=toInput(new Date());save();}renderApp();return;
 }
 clearPending();pendingDone=id;renderApp();
 pendingTimer=setTimeout(function(){pendingDone=null;pendingTimer=null;renderApp();},3000);
}
function toggleNotify(id){var it=find(id);if(it){it.notify=!it.notify;save();renderApp();}}
function togglePause(id){var it=find(id);if(it){it.paused=!it.paused;save();renderApp();}}
function del(id){items=items.filter(function(x){return x.id!==id;});delete expanded[id];save();renderApp();}
function upsert(o){var ex=find(o.id);if(ex){for(var k in o)ex[k]=o[k];}else items.push(o);save();}

/* ---------- render ---------- */
function sortedItems(){
 var rank={overdue:0,due:1,ok:2,unset:3};
 return items.slice().sort(function(a,b){
  if(!!a.paused!==!!b.paused)return a.paused?1:-1;
  var sa=statusOf(a),sb=statusOf(b);
  if(rank[sa.key]!==rank[sb.key])return rank[sa.key]-rank[sb.key];
  return (sa.due?sa.due.getTime():Infinity)-(sb.due?sb.due.getTime():Infinity);
 });
}
function timelineHTML(){
 var base=today(),months=[];
 for(var i=0;i<12;i++){var d=new Date(base.getFullYear(),base.getMonth()+i,1);months.push({d:d,label:d.toLocaleDateString("en-GB",{month:"narrow"}),dots:[]});}
 items.forEach(function(it){
  if(it.paused)return;var s=statusOf(it);if(!s.due)return;
  var mi=(s.due.getFullYear()-base.getFullYear())*12+(s.due.getMonth()-base.getMonth());
  if(mi<0)mi=0;if(mi>11)return;months[mi].dots.push(colorFor(s.key));
 });
 var cols=months.map(function(m,i){
  var dots="";m.dots.slice(0,4).forEach(function(c){dots+='<span class="tl-dot" style="background:'+c+'"></span>';});
  if(m.dots.length>4)dots+='<span class="tl-more">+'+(m.dots.length-4)+'</span>';
  if(m.dots.length===0)dots='<span class="tl-dot" style="background:rgba(255,255,255,.07)"></span>';
  return '<div class="tl-col'+(i===0?' now':'')+'"><div class="tl-dots">'+dots+'</div><span class="tl-m'+(i===0?' now':'')+'">'+m.label+'</span></div>';
 }).join("");
 return '<div class="tl"><div class="tl-h">Next 12 months</div><div class="tl-grid">'+cols+'</div></div>';
}
function heroHTML(it){
 var s=statusOf(it),color=colorFor(s.key);
 var center=s.key==="unset"?"\u2014":String(Math.abs(s.days));
 var small=s.key==="unset"?"":(s.days<0?"late":"days");
 return '<div class="hero" style="background:linear-gradient(155deg,'+color+'30,var(--card) 58%);border:1px solid '+color+'44">'
 +'<div class="eyebrow" style="color:'+color+'">Next up</div>'
 +'<div class="row">'+ring(s.progress,color,center,small,78)
 +'<div class="cMain"><h2>'+esc(it.name)+'</h2><div class="phr" style="color:var(--ink)">'+phrase(s)+'</div>'
 +'<div class="cad">'+cadence(it.intervalMonths)+'</div></div></div>'
 +(it.lastDone?'<div class="hero-pn"><span class="pn-item"><span class="pn-l">Past</span><span>'+fmtLong(pd(it.lastDone))+'</span></span><span class="pn-arw">\u2192</span><span class="pn-item"><span class="pn-l" style="color:'+color+'">Next</span><span style="color:'+color+'">'+fmtLong(s.due)+'</span></span></div>':'')
 +'<div class="hero-btns">'+(pendingDone===it.id?'<button class="btn btnPrimary confirm" data-action="done" data-id="'+it.id+'">'+ic("check",16,"#17140f")+' Tap to confirm</button>':'<button class="btn btnPrimary" data-action="done" data-id="'+it.id+'">'+ic("check",16,"#211d1b")+' Mark done</button>')
 +'<button class="btn btnGhost" data-action="edit" data-id="'+it.id+'">Details</button></div></div>';
}
function cardHTML(it){
 var s=statusOf(it),paused=!!it.paused,color=paused?"#7c726a":colorFor(s.key);
 var center=s.key==="unset"?"\u2014":String(Math.abs(s.days));
 var small=s.key==="unset"?"":(s.days<0?"late":"days");
 var open=!!expanded[it.id];
 var html='<div class="card'+(paused?" paused":"")+'"><div class="cEdge" style="background:'+color+'"></div>'
 +'<div class="cHead" data-action="toggle-expand" data-id="'+it.id+'">'+ring(s.progress,color,center,small)
 +'<div class="cMain"><h3 class="cName">'+esc(it.name)+'</h3><div class="cad">'+cadence(it.intervalMonths)+'</div></div>'
 +'<div class="cRight"><span class="phr" style="color:'+color+'">'+(paused?"Paused":phrase(s))+'</span><div class="rBtns">'
 +(paused
   ?'<button class="btn btnSm btnResume" data-action="toggle-pause" data-id="'+it.id+'">'+ic("play",14)+' Resume</button>'
   :(pendingDone===it.id?'<button class="btn btnSm btnDone confirm" data-action="done" data-id="'+it.id+'">'+ic("check",14)+' Confirm?</button>':'<button class="btn btnSm btnDone" data-action="done" data-id="'+it.id+'">'+ic("check",14)+' Done</button>'))
 +'<span class="chev'+(open?" open":"")+'">'+ic("chev",17,"#a99f95")+'</span></div></div></div>';
 html+= it.lastDone
   ? '<div class="pn"><span class="pn-item"><span class="pn-l">Past</span><span>'+fmtLong(pd(it.lastDone))+'</span></span><span class="pn-arw">\u2192</span><span class="pn-item"><span class="pn-l" style="color:'+color+'">Next</span><span style="color:'+color+'">'+fmtLong(s.due)+'</span></span></div>'
   : '<div class="pn"><span class="pn-empty">Not scheduled \u2014 tap to add a date</span></div>';
 if(open){
  html+='<div class="cBody"><div class="chips">'
  +'<button class="chip" data-action="edit" data-id="'+it.id+'" style="color:'+(it.cost?"var(--accent)":"var(--sub)")+'">'+ic("coins",13)+(it.cost?money(it.cost)+" / session":"Add cost")+'</button>'
  +'<button class="chip" data-action="edit" data-id="'+it.id+'" style="color:'+(it.provider?"var(--ink)":"var(--sub)")+'">'+ic("pin",13)+esc(it.provider||"Add clinic")+'</button>'
  +'<button class="toggle'+(it.notify?" on":"")+'" data-action="toggle-notify" data-id="'+it.id+'">'+ic(it.notify?"bell":"belloff",14)+(it.notify?"Alerts on":"Alerts off")+'</button>'
  +'<button class="pausechip" data-action="toggle-pause" data-id="'+it.id+'" style="color:'+(paused?"var(--ink)":"var(--sub)")+'">'+ic(paused?"play":"pause",13)+(paused?"Resume":"Pause")+'</button>'
  +'</div><div class="ed-row"><button class="iconbtn" data-action="edit" data-id="'+it.id+'">'+ic("pencil",16)+'</button><button class="iconbtn" data-action="delete" data-id="'+it.id+'">'+ic("trash",16)+'</button></div></div>';
 }
 html+='</div>';
 return html;
}
function renderApp(){
 var sorted=sortedItems();
 var active=sorted.filter(function(i){return !i.paused;});
 var paused=sorted.filter(function(i){return i.paused;});
 var hero=active[0],rest=active.slice(1);
 var attn=active.filter(function(i){return ["overdue","due"].indexOf(statusOf(i).key)>=0;}).length;
 var groups=[
  {l:"Needs attention",list:rest.filter(function(i){var k=statusOf(i).key;return k==="overdue"||k==="due";})},
  {l:"On the horizon",list:rest.filter(function(i){return statusOf(i).key==="ok";})},
  {l:"Not scheduled",list:rest.filter(function(i){return statusOf(i).key==="unset";})},
  {l:"Paused",list:paused}
 ];
 var spendProj=0;
 items.forEach(function(i){if(!i.paused)spendProj+=(i.cost||0)*(12/i.intervalMonths);});
 var h='<div class="wrap"><div class="head"><div class="spark"><span class="ln"></span>\ud83c\udf38<span class="ln"></span></div>'
 +'<h1>Beauty Maintenance</h1><p class="sub">'+(attn>0?attn+" need attention":"Everything's on track")+'</p></div>';
 h+=timelineHTML();
 if(hero)h+=heroHTML(hero);
 groups.forEach(function(g){
  if(!g.list.length)return;
  h+='<div class="sec"><span>'+g.l+'</span><span class="line"></span><span class="cnt">'+g.list.length+'</span></div>';
  g.list.forEach(function(it){h+=cardHTML(it);});
 });
 h+='<button class="add" data-action="add">'+ic("plus",18)+' Add a procedure</button>';
 h+='<div class="footer"><span>Estimated spend <b>~'+money(Math.round(spendProj))+' / year</b></span>'
 +'<select id="cur">'+CURR.map(function(s){return '<option'+(s===cur?" selected":"")+'>'+s+'</option>';}).join("")+'</select></div></div>';
 document.getElementById("app").innerHTML=h;
 var sel=document.getElementById("cur");
 if(sel)sel.onchange=function(){cur=this.value;try{localStorage.setItem("beauty:cur",cur);}catch(e){}renderApp();};
}

/* ---------- modal ---------- */
function renderModal(){
 var m=document.getElementById("modal");
 if(editing==null){m.innerHTML="";return;}
 var it=editing==="new"?null:find(editing);
 var name=it?it.name:"",interval=it?it.intervalMonths:3,cost=(it&&it.cost)?it.cost:"",prov=it?it.provider:"",lastD=it&&it.lastDone?it.lastDone:toInput(new Date()),nodate=it?!it.lastDone:false,notify=it?it.notify:true;
 var opts=RECUR.map(function(r){return '<option value="'+r.v+'"'+(r.v===interval?" selected":"")+'>'+r.l+'</option>';}).join("");
 m.innerHTML='<div class="overlay" id="ov"><div class="sheet" id="sheet">'
 +'<div class="sheet-h"><h2>'+(it?"Edit procedure":"New procedure")+'</h2><button class="closeb" id="mClose">'+ic("x",19)+'</button></div>'
 +'<label class="lbl">Name</label><input class="fld" id="mName" value="'+esc(name)+'" placeholder="e.g. Lash lift"/>'
 +'<label class="lbl">How often</label><select class="fld" id="mInt">'+opts+'</select>'
 +'<label class="lbl">Cost per session ('+cur+')</label><input class="fld" id="mCost" type="number" inputmode="decimal" min="0" value="'+esc(cost)+'" placeholder="0"/>'
 +'<label class="lbl">Clinic / doctor</label><input class="fld" id="mProv" value="'+esc(prov)+'" placeholder="e.g. Dr. Sara \u00b7 Glow Clinic"/>'
 +'<label class="lbl">Last done</label><input class="fld" id="mDate" type="date" value="'+lastD+'"'+(nodate?" disabled":"")+' style="'+(nodate?"opacity:.4":"")+'"/>'
 +'<label class="chk"><input type="checkbox" id="mNo"'+(nodate?" checked":"")+'/> No date yet \u2014 I\'ll schedule it</label>'
 +'<div class="notifyRow"><span style="font-size:15px">Alert me when it\'s due</span><button class="toggle'+(notify?" on":"")+'" id="mNotify" data-on="'+(notify?"1":"0")+'">'+ic(notify?"bell":"belloff",14)+(notify?"Alerts on":"Alerts off")+'</button></div>'
 +'<button class="btn btnPrimary" id="mSave" style="width:100%">'+(it?"Save changes":"Add procedure")+'</button>'
 +'</div></div>';
 document.getElementById("ov").onclick=function(e){if(e.target.id==="ov")close();};
 document.getElementById("mClose").onclick=close;
 var no=document.getElementById("mNo"),date=document.getElementById("mDate");
 no.onchange=function(){date.disabled=no.checked;date.style.opacity=no.checked?".4":"";};
 var nb=document.getElementById("mNotify");
 nb.onclick=function(){var on=nb.getAttribute("data-on")==="1";on=!on;nb.setAttribute("data-on",on?"1":"0");nb.className="toggle"+(on?" on":"");nb.innerHTML=ic(on?"bell":"belloff",14)+(on?"Alerts on":"Alerts off");};
 document.getElementById("mSave").onclick=function(){
  var nm=document.getElementById("mName").value.trim();if(!nm)return;
  var no2=document.getElementById("mNo").checked;
  var ld=no2?null:document.getElementById("mDate").value;
  upsert({id:it?it.id:"item-"+Date.now(),name:nm,lastDone:ld,intervalMonths:Number(document.getElementById("mInt").value),notify:document.getElementById("mNotify").getAttribute("data-on")==="1",cost:Number(document.getElementById("mCost").value)||0,provider:document.getElementById("mProv").value.trim(),paused:it?it.paused:false});
  editing=null;renderModal();renderApp();
 };
 function close(){editing=null;renderModal();}
}

/* ---------- events ---------- */
document.addEventListener("click",function(e){
 var t=e.target.closest("[data-action]");if(!t)return;
 var a=t.getAttribute("data-action"),id=t.getAttribute("data-id");
 if(a==="add"){editing="new";renderModal();}
 else if(a==="edit"){editing=id;renderModal();}
 else if(a==="toggle-expand"){expanded[id]=!expanded[id];renderApp();}
 else if(a==="done"){requestDone(id);}
 else if(a==="toggle-pause"){togglePause(id);}
 else if(a==="toggle-notify"){toggleNotify(id);}
 
 else if(a==="delete"){del(id);}
});

/* ---------- boot ---------- */
try{load();renderApp();}catch(err){document.getElementById("app").innerHTML='<div style="padding:60px 20px;text-align:center;color:#a99f95;font-family:system-ui">Something went wrong: '+err.message+'</div>';}
</script>
</body>
</html>
